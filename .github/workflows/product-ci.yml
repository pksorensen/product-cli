# GitHub Actions CI workflow for the Product CLI
# Gates PRs on: graph check, tests, clippy, benchmarks
#
# Usage: copy this file to .github/workflows/product-ci.yml in your repo

name: Product CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'docs/**'
      - 'product.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/product-ci.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'docs/**'
      - 'product.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/product-ci.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Single source of truth for the Rust version is rust-toolchain.toml.
      # Parse its channel field and pass it to the action so local builds and
      # CI stay in lockstep — bump rust-toolchain.toml and nothing else to
      # upgrade the compiler.
      - name: Parse toolchain version
        id: rust
        run: |
          version=$(grep '^channel' rust-toolchain.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.version }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p product

      - name: Tests (all binaries)
        # --no-fail-fast runs every test binary (lib, integration, sessions,
        # property, code_quality, doc) and reports the full result set rather
        # than stopping at the first failing binary. Matches the `cargo t`
        # alias defined in .cargo/config.toml.
        run: cargo test -p product --no-fail-fast

      - name: Clippy
        run: cargo clippy --workspace -- -D clippy::unwrap_used -D warnings

      - name: Convention check (xtask)
        # Enforces every CTX rule registered under xtask/src/checks/.
        # See conventions/README.md for the rule catalogue.
        run: cargo xtask check

      - name: Convention drift self-test
        # Verifies every registered Check has a matching conventions/docs/<id>.md
        # whose frontmatter id/title/adrs match the implementation.
        run: cargo xtask check --self-test

      - name: Supply-chain check (cargo-deny)
        # Enforces deny.toml — license allow-list, advisory database, banned
        # crates, and source restrictions. See conventions/docs/CTX-DEPS.md.
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace

      - name: Graph check
        run: |
          # Exits 0 (clean), 2 (warnings only) = pass
          # Exits 1 (errors) = fail
          cargo run -p product -- graph check || [ $? -eq 2 ]

      - name: Graph check JSON
        run: |
          # Capture JSON output (discard cargo stderr); allow exit 2 (warnings-only)
          cargo run -p product -- graph check --format json 2>/dev/null > /tmp/graph-check.json || [ $? -eq 2 ]
          # Verify the output is valid JSON
          python3 -c "import sys,json; json.load(open('/tmp/graph-check.json'))"

      - name: Benchmarks
        run: cargo bench -p product --bench graph_bench
