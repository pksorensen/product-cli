# Publish the product MCP server to the official MCP registry
# (registry.modelcontextprotocol.io) after a GitHub Release lands.
#
# Triggered by workflow_run on the "Release" workflow (cargo-dist). Using
# release.published doesn't work: events fired by the workflow's
# GITHUB_TOKEN (which is what cargo-dist uses to call `gh release create`)
# do not start downstream workflow runs — GitHub's anti-recursion guard.
# workflow_run is exempt from that rule.
#
# Also supports manual dispatch against an existing tag for re-publishing
# or back-filling. Kept in a separate file because release.yml is
# autogenerated by `dist generate`.
#
# The committed server.json carries placeholder values for the package's
# identifier URL and fileSha256 — the registry's MCPB validator requires
# a real SHA per release, and the URL embeds the tag. This workflow
# re-derives both from the actual GitHub Release before publishing.
#
# Per FT-065 / ADR-020: publish failure is non-fatal — the release itself
# ships regardless. The publish step uses continue-on-error so the workflow
# stays green and any registry-side failure surfaces via the step summary.
name: Publish to MCP Registry

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.4). Must already exist and have its assets uploaded.'
        required: true
        type: string

permissions:
  contents: read
  id-token: write  # required for GitHub OIDC token exchange with the registry

jobs:
  publish:
    name: Publish server.json
    runs-on: ubuntu-22.04
    # Run on manual dispatch, OR on a successful Release workflow that was
    # triggered by a tag push (workflow_run.event == 'push' and
    # head_branch starts with v). Skip prereleases when fired by workflow_run.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    env:
      MCP_PUBLISHER_VERSION: v1.7.8
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MCPB_TARGET: x86_64-unknown-linux-gnu
      MCPB_ARCHIVE_EXT: tar.xz
    steps:
      - name: Resolve target tag
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not determine target tag"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.tag }}
          persist-credentials: false

      - name: Verify Cargo.toml and server.json versions match the tag
        env:
          TAG_VERSION: ${{ steps.resolve.outputs.tag_version }}
        run: |
          set -euo pipefail
          CARGO_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          SERVER_VERSION=$(jq -r '.version' server.json)
          SERVER_PKG_VERSION=$(jq -r '.packages[0].version' server.json)
          echo "tag=$TAG_VERSION cargo=$CARGO_VERSION server=$SERVER_VERSION pkg=$SERVER_PKG_VERSION"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ] || [ "$SERVER_VERSION" != "$TAG_VERSION" ] || [ "$SERVER_PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: tag=$TAG_VERSION Cargo.toml=$CARGO_VERSION server.json=$SERVER_VERSION packages[0]=$SERVER_PKG_VERSION"
            echo "All four must agree before publishing. Bump the laggards (see .claude/skills/release/SKILL.md) and re-cut the release."
            exit 1
          fi

      - name: Fetch archive sha256 from the GitHub Release
        id: sha
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          ASSET="product-${MCPB_TARGET}.${MCPB_ARCHIVE_EXT}"
          SHA_ASSET="${ASSET}.sha256"
          echo "Fetching $SHA_ASSET from release $TAG..."
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "$SHA_ASSET" --dir /tmp
          # cargo-dist's .sha256 files are `<sha>  <filename>` — extract the hash.
          SHA=$(awk '{print $1}' "/tmp/${SHA_ASSET}" | tr '[:upper:]' '[:lower:]')
          if ! [[ "$SHA" =~ ^[a-f0-9]{64}$ ]]; then
            echo "::error::Invalid SHA in $SHA_ASSET: '$SHA'"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "Got SHA: $SHA"

      - name: Build publish manifest
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          TAG_VERSION: ${{ steps.resolve.outputs.tag_version }}
          SHA: ${{ steps.sha.outputs.sha }}
          ASSET: ${{ steps.sha.outputs.asset }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # The mcpb validator requires the URL to contain "mcp" (case-insensitive).
          # `?source=mcp-registry` is a no-op query that satisfies that check
          # without bloating the release with renamed asset copies. GitHub's
          # release-asset CDN ignores unknown query params.
          IDENTIFIER="https://github.com/${REPO}/releases/download/${TAG}/${ASSET}?source=mcp-registry"
          # Replace packages[0] wholesale so an older tag with the legacy
          # `github-release` shape still gets published in the current
          # mcpb shape. Preserve runtimeArguments and any environmentVariables
          # from the committed manifest.
          jq \
            --arg id "$IDENTIFIER" \
            --arg sha "$SHA" \
            --arg ver "$TAG_VERSION" \
            '
              .packages[0] = (
                (.packages[0] // {}) as $orig |
                {
                  registryType: "mcpb",
                  identifier: $id,
                  version: $ver,
                  transport: ($orig.transport // {type: "stdio"}),
                  fileSha256: $sha,
                  runtimeArguments: ($orig.runtimeArguments // []),
                }
                + (if $orig.environmentVariables then {environmentVariables: $orig.environmentVariables} else {} end)
              )
            ' \
            server.json > /tmp/server.publish.json
          echo "--- /tmp/server.publish.json ---"
          cat /tmp/server.publish.json

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -fLsS \
            -o /tmp/mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp mcp-publisher
          chmod +x /tmp/mcp-publisher
          /tmp/mcp-publisher --version || /tmp/mcp-publisher help || true

      - name: Authenticate via GitHub OIDC
        run: /tmp/mcp-publisher login github-oidc

      - name: Publish server.json
        id: publish
        continue-on-error: true
        run: /tmp/mcp-publisher publish /tmp/server.publish.json

      - name: Report outcome
        env:
          STATUS: ${{ steps.publish.outcome }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          if [ "$STATUS" = "success" ]; then
            echo "::notice::Published io.github.Hafeok/product-cli@${TAG} to registry.modelcontextprotocol.io"
            echo "Published io.github.Hafeok/product-cli@${TAG}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Publish step failed for ${TAG} — release shipped, registry entry was not updated. Re-run this workflow (workflow_dispatch with tag=${TAG}) or invoke mcp-publisher manually."
            echo "Publish FAILED for ${TAG} — release shipped, manual follow-up required." >> "$GITHUB_STEP_SUMMARY"
          fi
