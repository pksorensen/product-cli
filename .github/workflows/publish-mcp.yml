# Publish the product MCP server to the official MCP registry
# (registry.modelcontextprotocol.io) after a GitHub Release lands.
#
# Triggered by the `release.published` event fired by cargo-dist's
# `gh release create` in release.yml. Kept in a separate file because
# release.yml is autogenerated by `dist generate` and would clobber any
# edits on the next regeneration.
#
# Per FT-065 / ADR-020: publish failure is non-fatal — the release itself
# ships regardless. The publish step uses continue-on-error so the workflow
# stays green and any registry-side failure is surfaced via the step
# summary for manual follow-up.
name: Publish to MCP Registry

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required for GitHub OIDC token exchange with the registry

jobs:
  publish:
    name: Publish server.json
    runs-on: ubuntu-22.04
    # Skip prereleases — only stable releases publish to the registry.
    if: ${{ !github.event.release.prerelease }}
    env:
      MCP_PUBLISHER_VERSION: v1.7.8
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Verify server.json version matches the release tag
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          CARGO_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          SERVER_VERSION=$(jq -r '.version' server.json)
          SERVER_PKG_VERSION=$(jq -r '.packages[0].version' server.json)
          echo "tag=$TAG_VERSION cargo=$CARGO_VERSION server=$SERVER_VERSION pkg=$SERVER_PKG_VERSION"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ] || [ "$SERVER_VERSION" != "$TAG_VERSION" ] || [ "$SERVER_PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: tag=$TAG_VERSION Cargo.toml=$CARGO_VERSION server.json=$SERVER_VERSION packages[0]=$SERVER_PKG_VERSION"
            echo "All four must agree before publishing. Bump the laggards (see .claude/skills/release/SKILL.md) and re-cut the release."
            exit 1
          fi

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -fLsS \
            -o /tmp/mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp mcp-publisher
          chmod +x /tmp/mcp-publisher
          /tmp/mcp-publisher --version || /tmp/mcp-publisher help || true

      - name: Authenticate via GitHub OIDC
        run: /tmp/mcp-publisher login github-oidc

      - name: Publish server.json
        id: publish
        continue-on-error: true
        run: /tmp/mcp-publisher publish

      - name: Report outcome
        env:
          STATUS: ${{ steps.publish.outcome }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$STATUS" = "success" ]; then
            echo "::notice::Published io.github.hafeok/product-cli@${TAG} to registry.modelcontextprotocol.io"
            echo "Published io.github.hafeok/product-cli@${TAG}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Publish step failed for ${TAG} — release shipped, registry entry was not updated. Re-run this workflow or invoke mcp-publisher manually."
            echo "Publish FAILED for ${TAG} — release shipped, manual follow-up required." >> "$GITHUB_STEP_SUMMARY"
          fi
